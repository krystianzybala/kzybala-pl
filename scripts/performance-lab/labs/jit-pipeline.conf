#!/usr/bin/env bash
# Evidence configuration: jit-pipeline (docs/linux-evidence-runner.md).
# Startup/warm-up/deopt are TIME SERIES in dedicated aux harnesses with
# per-variant compilation logs ({VDIR}/jit-compilation.log — exact JVM
# flags recorded in the run's toolchain/profile evidence); steady-state
# call-site-shape and escape-analysis costs are JMH variants. The Rust
# AOT baseline runs as a SEPARATE scenario attached to steady-mono and is
# never merged with or compared against JVM warm-up phases.
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java rust"
LAB_CPU_SET_REQUIREMENT="core_single"
LAB_RUNTIME_CLASS="long"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=1
LAB_MIN_CPUS=1
LAB_JAVA_DIR="content/labs/jit-pipeline/code/java"
LAB_RUST_DIR="content/labs/jit-pipeline/code/rust"
EV_SELECTOR="pl.kzybala.lab.jitpipeline.JitSteadyStateBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "warmup-trajectory deopt-trajectory steady-mono steady-bi steady-mega ea-on ea-off"
}

lab_variant_kind() {
  case "$1" in
    warmup-trajectory|deopt-trajectory) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

lab_jmh_args() {
  case "$1" in
    ea-on|ea-off) echo "-p callShape=escape" ;;
    *) echo "-p callShape=${1#steady-}" ;;
  esac
}

lab_aux_evidence_cmd() {
  local common="java -Dplab.cpuA=${CPU_LIST[0]} -Dplab.placementDir={VDIR} -Xlog:jit+compilation=info:file={VDIR}/jit-compilation.log -cp target/benchmarks.jar"
  case "$1" in
    warmup-trajectory)
      echo "${common} pl.kzybala.lab.jitpipeline.WarmupTrajectoryHarness --blocks 20000 --calls-per-block 64" ;;
    deopt-trajectory)
      echo "${common} pl.kzybala.lab.jitpipeline.DeoptTrajectoryHarness --blocks-per-phase 6000 --calls-per-block 64" ;;
  esac
}

lab_threads() {
  echo 1
}

lab_cpu_count() {
  echo 1
}

# Per-variant JVM args: the escape-analysis pair differs ONLY in the
# -XX:±DoEscapeAnalysis flag (recorded in the run's evidence).
lab_worker_props() {
  case "$1" in
    ea-off) echo "-Dplab.cpuA=${CPU_LIST[0]} -XX:-DoEscapeAnalysis" ;;
    ea-on) echo "-Dplab.cpuA=${CPU_LIST[0]} -XX:+DoEscapeAnalysis" ;;
    *) echo "-Dplab.cpuA=${CPU_LIST[0]}" ;;
  esac
}

# AOT baseline: separate scenario, attached once (steady-mono variant).
lab_rust_evidence_cmd() {
  case "$1" in
    steady-mono) echo "cargo run --release --quiet --bin aot_baseline -- --cpus ${CPU_LIST[0]} --seconds 5 --warmup-seconds 2" ;;
    *) echo "" ;;
  esac
}
