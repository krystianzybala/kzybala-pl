#!/usr/bin/env bash
# Evidence configuration: mesi (docs/linux-evidence-runner.md).
# MEASURED coherence scenarios only — the lab's educational MESI simulator
# is page-side teaching material and never enters evidence. Two pinned
# workers on distinct physical cores; perf c2c is REQUIRED because
# ownership-transfer (HITM) evidence is the point of the measured half.
# Hardware counters support coherence-traffic conclusions, never claims
# about exact MESI states at exact moments.
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java"
LAB_CPU_SET_REQUIREMENT="core_pair"
LAB_RUNTIME_CLASS="standard"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=2
LAB_MIN_CPUS=2
LAB_JAVA_DIR="content/labs/mesi/code/java"
EV_SELECTOR="pl.kzybala.lab.mesi.MesiLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=1
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "singleWriter sharedReaders writerInvalidation pingPong paddedLines"
}

lab_jmh_args() {
  echo "-p scenario=$1"
}

lab_threads() {
  echo 2
}

lab_cpu_count() {
  echo 2
}

lab_worker_props() {
  echo "-Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]}"
}

lab_rust_evidence_cmd() {
  echo ""
}
