#!/usr/bin/env bash
# Evidence configuration: spsc-ring-buffer (docs/linux-evidence-runner.md).
# One persistent producer worker + one persistent consumer worker, one
# physical core each. Scenarios cover cached vs uncached cursor reads,
# single-item vs batched publication, and two capacities. Java (JMH group,
# persistent threads) and Rust (persistent-worker harness,
# spsc_evidence bin) share the same operation definition, capacities,
# batch sizes and correctness fixture — the old Criterion spawn/join
# benchmark is a separate lifecycle-cost experiment and never enters this
# comparison (docs/measurement-environments.md, comparison-guard).
#
# Two measured views per matrix point (post batch-20260717T150131Z hang):
#   - <case> (kind=jmh): JMH grouped benchmark — per-operation cost view.
#     Its methods are Control.stopMeasurement-bounded (termination-safe)
#     and its invocation throughput is NEVER item throughput; the item
#     rates live in the AuxCounters (producedItems, consumedItems,
#     producerFullRetries, consumerEmptyPolls, sequenceViolations).
#   - harness-<case> (kind=aux): SpscTransferHarness — finite N items,
#     start barrier, shared cancellation, internal deadline; the PRIMARY
#     end-to-end items/s evidence. It cannot hang by construction.
#
# Matrix split: publication-core is the defect-revealing minimum (the exact
# previously-hanging case cached-b1-c1024 plus its uncached and batched
# contrasts, in both views); publication-sweep ADDS the capacity sweep
# (c65536). The default is the FULL matrix — the split exists so a focused
# rerun is cheap, not to hide any variant (PLAB_SPSC_MATRIX=core|sweep).
LAB_CONF_VERSION=1
# Batch metadata (run-all-benchmarks.sh): readiness, languages, CPU-set
# requirement, runtime/cooldown class, repetition/import support.
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java rust"
LAB_CPU_SET_REQUIREMENT="core_pair"
LAB_RUNTIME_CLASS="standard"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=2
LAB_MIN_CPUS=2
LAB_JAVA_DIR="content/labs/spsc-ring-buffer/code/java"
LAB_RUST_DIR="content/labs/spsc-ring-buffer/code/rust"
EV_SELECTOR="pl.kzybala.lab.spscringbuffer.SpscLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1
# Finite-harness workload: enough items that the steady state dominates,
# with an internal deadline far above the expected duration (the runner's
# external run_with_deadline budget is the hard backstop above that).
SPSC_HARNESS_ITEMS=50000000
SPSC_HARNESS_DEADLINE_SECONDS=120

_spsc_core_cases() { echo "cached-b1-c1024 uncached-b1-c1024 cached-b64-c1024"; }
_spsc_sweep_cases() { echo "cached-b1-c65536"; }

lab_variants() {
  local cases c
  case "${PLAB_SPSC_MATRIX:-sweep}" in
    core) cases="$(_spsc_core_cases)" ;;
    *) cases="$(_spsc_core_cases) $(_spsc_sweep_cases)" ;;
  esac
  local out=""
  for c in $cases; do out="${out} ${c} harness-${c}"; done
  echo "${out# }"
}

lab_variant_kind() {
  case "$1" in
    harness-*) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

_spsc_parts() { # <variant> -> "cursorMode batch capacity"
  local v="${1#harness-}"
  local mode="${v%%-*}"
  local rest="${v#*-}"
  local batch="${rest%%-*}"; batch="${batch#b}"
  local capacity="${rest#*-}"; capacity="${capacity#c}"
  echo "$mode $batch $capacity"
}

lab_jmh_args() {
  read -r mode batch capacity <<<"$(_spsc_parts "$1")"
  echo "-p cursorMode=${mode} -p batch=${batch} -p capacity=${capacity}"
}

# Finite transfer harness (kind=aux): exactly N items, start barrier,
# shared cancellation, internal deadline, bounded joins — the primary
# items/s source; exits non-zero unless the transfer completed exactly.
lab_aux_evidence_cmd() {
  case "$1" in
    harness-*)
      read -r mode batch capacity <<<"$(_spsc_parts "$1")"
      echo "java -Xms1g -Xmx1g -XX:+UseSerialGC --enable-native-access=ALL-UNNAMED -Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]} -cp target/benchmarks.jar pl.kzybala.lab.spscringbuffer.SpscTransferHarness --items ${SPSC_HARNESS_ITEMS} --capacity ${capacity} --cursor-mode ${mode} --batch ${batch} --deadline-seconds ${SPSC_HARNESS_DEADLINE_SECONDS}"
      ;;
    *) echo "" ;;
  esac
}

lab_threads() {
  echo 2
}

lab_cpu_count() {
  echo 2
}

lab_worker_props() {
  echo "-Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]}"
}

# Persistent-worker Rust harness (not Criterion): workers created outside
# the timed steady-state interval, same capacity/batch semantics, no
# allocation in the measured path. Prints one JSON document on stdout.
# The harness-* variants are the Java finite-transfer view; the Rust side
# runs once per matrix case (on the jmh-kind variant) to avoid duplicating
# identical Rust runs.
lab_rust_evidence_cmd() {
  case "$1" in
    harness-*) echo "" ;;
    *)
      read -r mode batch capacity <<<"$(_spsc_parts "$1")"
      echo "cargo run --release --quiet --bin spsc_evidence -- --cursor-mode ${mode} --batch ${batch} --capacity ${capacity} --cpus ${CPU_LIST[0]},${CPU_LIST[1]} --seconds 5 --warmup-seconds 2"
      ;;
  esac
}
