#!/usr/bin/env bash
# Evidence configuration: benchmark-harness-traps
# (docs/linux-evidence-runner.md). One pinned worker; every variant is a
# trap/corrected measurement shape of the SAME kernel (shared fixtures,
# docs/benchmark-correctness-fixtures.md), so the harness is the only
# variable. The publication core measures the defect-revealing cell of
# each variant axis:
#   folded-scalar / runtime-scalar     — constant-foldable vs runtime input
#   returned-reduction / consumed-...  — the two anti-DCE result sinks
#   setup-inside-parser / setup-out... — setup inside vs outside the timing
#   runtime-counter                    — per-invocation-reset stateful op
#   fork-single-scalar (kind=aux)      — single-fork contrast against the
#                                        profile's isolated forks
# The measured side is Java/JMH; the Rust/Criterion track is a methodology
# instrument run locally (cargo bench) and is never merged into one
# ranking with JMH (instrument asymmetry documented in benchmark.md).
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java"
LAB_CPU_SET_REQUIREMENT="core_single"
LAB_RUNTIME_CLASS="standard"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: a single pinned worker; extra CPUs would silently
# change the placement scenario.
LAB_CPUS_EXACT=1
LAB_MIN_CPUS=1
LAB_JAVA_DIR="content/labs/benchmark-harness-traps/code/java"
LAB_RUST_DIR="content/labs/benchmark-harness-traps/code/rust"
EV_SELECTOR="pl.kzybala.lab.harnesstraps.HarnessTrapsBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "folded-scalar runtime-scalar returned-reduction consumed-reduction setup-inside-parser setup-outside-parser runtime-counter fork-single-scalar"
}

lab_variant_kind() {
  case "$1" in
    fork-single-*) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

# All benchmark methods live in one class; a variant selects exactly one
# method by EXCLUDING the other five (JMH -e), so no run ever mixes
# measurement shapes in one process invocation.
_bht_method() {
  case "$1" in
    folded-*) echo "foldedInput" ;;
    runtime-*) echo "runtimeInput" ;;
    returned-*) echo "returnedResult" ;;
    consumed-*) echo "consumedResult" ;;
    setup-inside-*) echo "setupInsideTimed" ;;
    setup-outside-*) echo "setupOutside" ;;
    fork-single-*) echo "runtimeInput" ;;
  esac
}

_bht_dataset() {
  case "$1" in
    *-scalar) echo "scalar" ;;
    *-reduction) echo "reduction" ;;
    *-parser) echo "parser" ;;
    *-counter) echo "counter" ;;
  esac
}

_bht_exclusions() { # <kept method> -> alternation of the other five
  local all="foldedInput runtimeInput returnedResult consumedResult setupInsideTimed setupOutside"
  local out="" m
  for m in $all; do
    [ "$m" = "$1" ] && continue
    out="${out}|${m}"
  done
  echo "${out#|}"
}

lab_jmh_args() {
  local method dataset
  method="$(_bht_method "$1")"
  dataset="$(_bht_dataset "$1")"
  echo "-p dataset=${dataset} -e '\\.($(_bht_exclusions "$method"))\$'"
}

lab_threads() {
  echo 1
}

lab_cpu_count() {
  echo 1
}

lab_worker_props() {
  echo "-Dplab.cpuA=${CPU_LIST[0]}"
}

# Single-fork contrast (kind=aux): the same corrected method and dataset as
# runtime-scalar, but deliberately ONE fork — the run whose missing
# fork-to-fork spread the isolated-fork variants expose. Fixed small
# profile, recorded verbatim; its output is diagnostic contrast evidence,
# never a standalone performance claim.
lab_aux_evidence_cmd() {
  case "$1" in
    fork-single-*)
      echo "java -Xms1g -Xmx1g -XX:+UseSerialGC -XX:ActiveProcessorCount=1 --enable-native-access=ALL-UNNAMED -Dplab.cpuA=${CPU_LIST[0]} -Dplab.placementDir={VDIR} -jar target/benchmarks.jar 'HarnessTrapsBenchmark\\.runtimeInput\$' -p dataset=scalar -t 1 -f 1 -wi 5 -w 1s -i 10 -r 1s -rf json -rff {VDIR}/fork-single-jmh.json"
      ;;
    *) echo "" ;;
  esac
}

lab_rust_evidence_cmd() {
  echo ""
}
