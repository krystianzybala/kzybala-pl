#!/usr/bin/env bash
# Evidence configuration: memory-ordering (docs/linux-evidence-runner.md).
# Two deliberately separate measured halves:
#   - litmus-* variants (kind=aux): outcome-FREQUENCY experiments in a
#     dedicated persistent-worker harness — counts over trials, never JMH,
#     never average-time; zero forbidden outcomes is evidence, not proof;
#   - cost-* variants (kind=jmh): per-operation ordering-strength cost
#     (plain/opaque/release/volatile publication stores), one pinned worker.
# Java-only measured side: the ordering mechanism is the subject; no
# cross-language comparison is published by this lab.
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java"
LAB_CPU_SET_REQUIREMENT="core_pair"
LAB_RUNTIME_CLASS="standard"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
LAB_MIN_CPUS=2
LAB_JAVA_DIR="content/labs/memory-ordering/code/java"
EV_SELECTOR="pl.kzybala.lab.memoryordering.MemoryOrderingCostBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1
LITMUS_TRIALS=2000000

lab_variants() {
  echo "litmus-mp-plain litmus-mp-acqrel litmus-mp-volatile litmus-sb-opaque litmus-sb-volatile cost-plain cost-opaque cost-release cost-volatile"
}

lab_variant_kind() {
  case "$1" in
    litmus-*) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

lab_jmh_args() {
  echo "-p accessMode=${1#cost-}"
}

lab_aux_evidence_cmd() {
  local rest="${1#litmus-}"
  local test="${rest%%-*}"
  local mode="${rest#*-}"
  echo "java -Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]} -cp target/benchmarks.jar pl.kzybala.lab.memoryordering.LitmusEvidenceHarness --test ${test} --mode ${mode} --trials ${LITMUS_TRIALS}"
}

lab_threads() {
  case "$1" in
    litmus-*) echo 2 ;;
    *) echo 1 ;;
  esac
}

lab_cpu_count() {
  case "$1" in
    litmus-*) echo 2 ;;
    *) echo 1 ;;
  esac
}

lab_worker_props() {
  case "$1" in
    litmus-*) echo "-Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]}" ;;
    *) echo "-Dplab.cpuA=${CPU_LIST[0]}" ;;
  esac
}

lab_rust_evidence_cmd() {
  echo ""
}
