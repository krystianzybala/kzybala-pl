#!/usr/bin/env bash
# Evidence configuration: cas-contention (docs/linux-evidence-runner.md).
# Contender sweep (1/2/4/8 where the validated CPU set supports it) ×
# retry policy (none / fixed / exponential+jitter with a recorded seed),
# plus the single-writer baseline. Every scenario's workers are pinned to
# a deterministic prefix of the validated CPU list; the exact mapping is
# recorded in the scenario's worker-placement evidence and in
# benchmark-profile.json.
LAB_CONF_VERSION=1
# Batch metadata (run-all-benchmarks.sh): readiness, languages, CPU-set
# requirement, runtime/cooldown class, repetition/import support.
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java rust"
LAB_CPU_SET_REQUIREMENT="core_octet"
LAB_RUNTIME_CLASS="long"
LAB_COOLDOWN_CLASS="long"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=8
LAB_MIN_CPUS=8
LAB_JAVA_DIR="content/labs/cas-contention/code/java"
LAB_RUST_DIR="content/labs/cas-contention/code/rust"
EV_SELECTOR="pl.kzybala.lab.cascontention.CasLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1

# Contender counts are derived from the validated CPU set size — "8
# contenders where the selected physical CPU set supports it", never
# hardcoded logical CPU numbers.
_cas_contender_counts() {
  local n=${#CPU_LIST[@]}
  local counts="1 2"
  [ "$n" -ge 4 ] && counts="$counts 4"
  [ "$n" -ge 8 ] && counts="$counts 8"
  echo "$counts"
}

lab_variants() {
  local variants="single-writer"
  local c
  for c in $(_cas_contender_counts); do
    variants="$variants cas-t${c}-none cas-t${c}-fixed cas-t${c}-expjitter"
  done
  echo "$variants"
}

_cas_parts() { # <variant> -> "threads policy"
  local v="$1"
  if [ "$v" = "single-writer" ]; then
    echo "1 baseline"
    return
  fi
  local rest="${v#cas-t}"
  echo "${rest%%-*} ${rest#*-}"
}

lab_jmh_args() {
  read -r threads policy <<<"$(_cas_parts "$1")"
  if [ "$policy" = "baseline" ]; then
    echo "-p scenario=singleWriter"
  else
    echo "-p scenario=cas -p backoff=${policy}"
  fi
}

lab_threads() {
  read -r threads _ <<<"$(_cas_parts "$1")"
  echo "$threads"
}

lab_cpu_count() {
  lab_threads "$1"
}

# Worker i pins to CPU_LIST[i] — a deterministic prefix of the validated
# input set (consumed by the benchmark's per-thread pin state via
# plab.workerCpus).
lab_worker_props() {
  local count
  count=$(lab_cpu_count "$1")
  local csv="${CPU_LIST[0]}"
  local i
  for ((i = 1; i < count; i++)); do csv="${csv},${CPU_LIST[i]}"; done
  echo "-Dplab.workerCpus=${csv}"
}

lab_rust_evidence_cmd() {
  read -r threads policy <<<"$(_cas_parts "$1")"
  local count
  count=$(lab_cpu_count "$1")
  local csv="${CPU_LIST[0]}"
  local i
  for ((i = 1; i < count; i++)); do csv="${csv},${CPU_LIST[i]}"; done
  echo "cargo run --release --quiet --bin cas_evidence -- --scenario ${policy} --threads ${threads} --cpus ${csv} --seconds 5 --warmup-seconds 2"
}
