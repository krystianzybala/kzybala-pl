#!/usr/bin/env bash
# Evidence configuration: thread-per-core (docs/linux-evidence-runner.md).
# Same business operation ("record one event in a partition") under three
# ownership disciplines (jmh variants, 4 pinned workers), plus the
# queue-shaped scenarios in a dedicated persistent-worker harness (aux):
# uniform cross-core handoff, hot-partition bounded backpressure, and the
# scheduler-migration diagnostic (pinning intentionally disabled inside
# taskset containment — diagnostic evidence, never publication-comparable
# throughput). Rust harness covers partitioned vs shared with the same
# operation definition; handoff/backpressure are Java-only (documented).
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java rust"
LAB_CPU_SET_REQUIREMENT="core_quad"
LAB_RUNTIME_CLASS="long"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=4
LAB_MIN_CPUS=4
LAB_JAVA_DIR="content/labs/thread-per-core/code/java"
LAB_RUST_DIR="content/labs/thread-per-core/code/rust"
EV_SELECTOR="pl.kzybala.lab.threadpercore.TpcLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=0
# Ownership-discipline cost is a per-op JMH/perf-stat question here — no
# cache-line-ownership/HITM evidence needed.
LAB_PROFILER_POLICY="stat"
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "partitioned sharedPool hotPartition handoff backpressure migration-diagnostic"
}

lab_variant_kind() {
  case "$1" in
    handoff|backpressure|migration-diagnostic) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

lab_jmh_args() {
  echo "-p scenario=$1"
}

_tpc_cpu_csv() {
  local count="$1"
  local csv="${CPU_LIST[0]}"
  local i
  for ((i = 1; i < count; i++)); do csv="${csv},${CPU_LIST[i]}"; done
  echo "$csv"
}

lab_aux_evidence_cmd() {
  local scenario="$1"
  local props="-Dplab.workerCpus=$(_tpc_cpu_csv 4) -Dplab.placementDir=."
  if [ "$scenario" = "migration-diagnostic" ]; then
    echo "java -cp target/benchmarks.jar pl.kzybala.lab.threadpercore.TpcHandoffBackpressureHarness --scenario migration-diagnostic --owners 3 --capacity 1024 --seconds 5 --warmup-seconds 2 --no-pin"
  else
    echo "java ${props} -cp target/benchmarks.jar pl.kzybala.lab.threadpercore.TpcHandoffBackpressureHarness --scenario ${scenario} --owners 3 --capacity 1024 --seconds 5 --warmup-seconds 2"
  fi
}

lab_threads() {
  echo 4
}

lab_cpu_count() {
  echo 4
}

lab_worker_props() {
  echo "-Dplab.workerCpus=$(_tpc_cpu_csv 4)"
}

lab_rust_evidence_cmd() {
  case "$1" in
    partitioned) echo "cargo run --release --quiet --bin tpc_evidence -- --scenario partitioned --workers 4 --cpus $(_tpc_cpu_csv 4) --seconds 5 --warmup-seconds 2" ;;
    sharedPool) echo "cargo run --release --quiet --bin tpc_evidence -- --scenario shared --workers 4 --cpus $(_tpc_cpu_csv 4) --seconds 5 --warmup-seconds 2" ;;
    *) echo "" ;;
  esac
}
