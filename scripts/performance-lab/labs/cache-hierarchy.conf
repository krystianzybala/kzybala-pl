#!/usr/bin/env bash
# Evidence configuration: cache-hierarchy (docs/linux-evidence-runner.md).
# One pinned worker chasing a dependent single-cycle table whose size is
# bound to the DETECTED cache topology (never a hardcoded byte count —
# the resolved manifest is written per run as cache-topology-<pid>.json).
# Datasets are byte-identical across Java and Rust (shared xorshift64 +
# Sattolo, fixture-checksum-verified before any timing).
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java rust"
LAB_CPU_SET_REQUIREMENT="core_single"
LAB_RUNTIME_CLASS="long"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Exact cardinality: too few CPUs cannot host the workers; extra CPUs
# would silently change the placement scenario — both are errors.
LAB_CPUS_EXACT=1
LAB_MIN_CPUS=1
LAB_JAVA_DIR="content/labs/cache-hierarchy/code/java"
LAB_RUST_DIR="content/labs/cache-hierarchy/code/rust"
EV_SELECTOR="pl.kzybala.lab.cachehierarchy.CacheHierarchyLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=0
# Cache-level claims here come from LLC/dTLB counters (LAB_PERF_EVENTS
# below), not from cache-line-ownership/HITM evidence — perf stat only.
LAB_PROFILER_POLICY="stat"
LAB_REPRODUCTIONS_REQUIRED=1
# LLC events are what separate "exceeds LLC" from "fits" — cache-level
# claims are only made from these counters plus the detected topology.
LAB_PERF_EVENTS="cycles,instructions,cache-references,cache-misses,LLC-loads,LLC-load-misses,dTLB-load-misses,branches,branch-misses,task-clock,context-switches,cpu-migrations,page-faults"

lab_variants() {
  local variants=""
  local pattern set
  for pattern in seq rand; do
    for set in l1 l2 llc memory; do
      variants="${variants} ${pattern}-${set}"
    done
  done
  echo "$variants"
}

_ch_parts() { # <variant> -> "pattern workingSet"
  local v="$1"
  local pattern="${v%%-*}"
  [ "$pattern" = "seq" ] && pattern="sequential" || pattern="random"
  echo "$pattern ${v#*-}"
}

lab_jmh_args() {
  read -r pattern set <<<"$(_ch_parts "$1")"
  echo "-p pattern=${pattern} -p workingSet=${set}"
}

lab_threads() {
  echo 1
}

lab_cpu_count() {
  echo 1
}

lab_worker_props() {
  echo "-Dplab.cpuA=${CPU_LIST[0]}"
}

lab_rust_evidence_cmd() {
  read -r pattern set <<<"$(_ch_parts "$1")"
  echo "cargo run --release --quiet --bin cache_evidence -- --pattern ${pattern} --working-set ${set} --cpus ${CPU_LIST[0]} --seconds 5 --warmup-seconds 2"
}
