#!/usr/bin/env bash
# Evidence configuration: false-sharing (docs/linux-evidence-runner.md).
# Sourced by run-linux-evidence.sh. Version 2 (worker-affinity model).
LAB_CONF_VERSION=2
LAB_MIN_CPUS=2
LAB_JAVA_DIR="content/labs/false-sharing/code/java"
EV_SELECTOR="pl.kzybala.lab.falsesharing.FalseSharingLinuxEvidenceBenchmark"
LAB_C2C_REQUIRED=1
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "shared padded"
}

# JMH parameter selection for one variant — exactly one layout per JVM
# invocation, never both.
lab_jmh_args() {
  echo "-p layout=$1"
}

lab_threads() {
  echo 2
}

lab_cpu_count() {
  echo 2
}

# Immutable JVM properties carrying the explicit worker→CPU assignment;
# the benchmark's PinWriterA/PinWriterB states consume them and write the
# worker-placement evidence.
lab_worker_props() {
  echo "-Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]}"
}

# No Rust publication harness for this lab (the cross-language contract is
# a layout illustration; see the lab's equivalence contract).
lab_rust_evidence_cmd() {
  echo ""
}
