#!/usr/bin/env bash
# Evidence configuration: clocks-latency-histograms
# (docs/linux-evidence-runner.md). Distribution mechanics are
# DETERMINISTIC (shared fixtures verified by both suites and re-verified
# inside the replay harnesses, which exit non-zero on any deviation); the
# host measurements are the instrument costs:
#   jmh kind (one pinned worker): baseline-fixed / timestamp-every-fixed /
#     sampled-fixed / record-only-fixed — the per-op price of observation,
#     with timer overhead derived as differences between variants;
#   aux kind: calibration (nanoTime cost/granularity/monotonicity),
#     co-pause and co-burst (deterministic replays + recording wall time),
#     merge-pair (TWO pinned workers, per-thread recording + exact merge).
# Java/JMH is the measured side for the runner; the Rust/Criterion track
# is a separate instrument run locally (cargo bench) and never merged
# into one ranking with JMH.
LAB_CONF_VERSION=1
LAB_BENCHMARK_READY=1
LAB_LANGUAGES="java"
LAB_CPU_SET_REQUIREMENT="core_pair"
LAB_RUNTIME_CLASS="standard"
LAB_COOLDOWN_CLASS="standard"
LAB_IMPORT_SUPPORTED=1
# Pair cardinality: the merge harness needs two pinned workers; single-
# worker variants use the deterministic first-CPU prefix.
LAB_CPUS_EXACT=2
LAB_MIN_CPUS=2
LAB_JAVA_DIR="content/labs/clocks-latency-histograms/code/java"
LAB_RUST_DIR="content/labs/clocks-latency-histograms/code/rust"
EV_SELECTOR="pl.kzybala.lab.clockslatency.RecordingCostBenchmark"
LAB_C2C_REQUIRED=0
LAB_REPRODUCTIONS_REQUIRED=1

lab_variants() {
  echo "baseline-fixed timestamp-every-fixed sampled-fixed record-only-fixed calibration co-pause co-burst merge-pair"
}

lab_variant_kind() {
  case "$1" in
    calibration|co-*|merge-*) echo "aux" ;;
    *) echo "jmh" ;;
  esac
}

_clh_method() {
  case "$1" in
    baseline-*) echo "baselineOp" ;;
    timestamp-every-*) echo "timestampEveryOp" ;;
    sampled-*) echo "sampledTimestamp" ;;
    record-only-*) echo "recordOnly" ;;
  esac
}

_clh_exclusions() { # <kept method> -> alternation of the other three
  local all="baselineOp timestampEveryOp sampledTimestamp recordOnly"
  local out="" m
  for m in $all; do
    [ "$m" = "$1" ] && continue
    out="${out}|${m}"
  done
  echo "${out#|}"
}

lab_jmh_args() {
  case "$(lab_variant_kind "$1")" in
    aux) echo "" ;;
    *) echo "-e '\\.($(_clh_exclusions "$(_clh_method "$1")"))\$'" ;;
  esac
}

lab_threads() {
  case "$1" in
    merge-*) echo 2 ;;
    *) echo 1 ;;
  esac
}

lab_cpu_count() {
  case "$1" in
    merge-*) echo 2 ;;
    *) echo 1 ;;
  esac
}

lab_worker_props() {
  case "$1" in
    merge-*) echo "-Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]}" ;;
    *) echo "-Dplab.cpuA=${CPU_LIST[0]}" ;;
  esac
}

lab_aux_evidence_cmd() {
  local base="java -Xms1g -Xmx1g -XX:+UseSerialGC --enable-native-access=ALL-UNNAMED -Dplab.placementDir={VDIR}"
  case "$1" in
    calibration)
      echo "${base} -XX:ActiveProcessorCount=1 -Dplab.cpuA=${CPU_LIST[0]} -cp target/benchmarks.jar pl.kzybala.lab.clockslatency.CalibrationHarness --samples 1000000"
      ;;
    co-pause)
      echo "${base} -XX:ActiveProcessorCount=1 -Dplab.cpuA=${CPU_LIST[0]} -cp target/benchmarks.jar pl.kzybala.lab.clockslatency.CoReplayHarness --dataset pause"
      ;;
    co-burst)
      echo "${base} -XX:ActiveProcessorCount=1 -Dplab.cpuA=${CPU_LIST[0]} -cp target/benchmarks.jar pl.kzybala.lab.clockslatency.CoReplayHarness --dataset burst"
      ;;
    merge-pair)
      echo "${base} -XX:ActiveProcessorCount=2 -Dplab.cpuA=${CPU_LIST[0]} -Dplab.cpuB=${CPU_LIST[1]} -cp target/benchmarks.jar pl.kzybala.lab.clockslatency.MergeHarness"
      ;;
    *) echo "" ;;
  esac
}

lab_rust_evidence_cmd() {
  echo ""
}
